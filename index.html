<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Giveaway Wheel</title>

<!-- Favicon -->
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">

<!-- PWA manifest -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#7c3aed">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GW Wheel">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<!-- MS Tiles -->
<meta name="msapplication-TileColor" content="#1a1a2e">
<meta name="msapplication-TileImage" content="/icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
    color: #e0d4f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  h1 {
    text-align: center;
    padding: 24px 0 8px;
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #c084fc, #a855f7, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }

  .container {
    display: flex;
    gap: 36px;
    padding: 20px 32px 32px;
    max-width: 1100px;
    width: 100%;
    align-items: flex-start;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ---- Wheel Area ---- */
  .wheel-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .wheel-wrapper {
    position: relative;
    width: 420px;
    height: 420px;
    transition: transform 0s;
    transform-origin: center top;
  }

  canvas {
    width: 420px;
    height: 420px;
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(139, 92, 246, 0.35), 0 0 80px rgba(139, 92, 246, 0.15);
  }

  .pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 36px solid #c084fc;
    filter: drop-shadow(0 0 8px rgba(192, 132, 252, 0.7));
    z-index: 10;
  }

  #spinBtn {
    padding: 14px 48px;
    font-size: 1.25rem;
    font-weight: 700;
    color: #fff;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    cursor: pointer;
    letter-spacing: 1px;
    transition: box-shadow 0.25s, transform 0.15s;
    box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
  }

  #spinBtn:hover:not(:disabled) {
    box-shadow: 0 0 30px rgba(168, 85, 247, 0.7);
    transform: scale(1.04);
  }

  #spinBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ---- Winner Display ---- */
  #winnerDisplay {
    margin-top: 4px;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---- Sidebar Panel ---- */
  .panel {
    background: #16213e;
    border-radius: 16px;
    padding: 24px;
    width: 300px;
    border: 1px solid rgba(139, 92, 246, 0.2);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  .panel h2 {
    font-size: 1.1rem;
    margin-bottom: 14px;
    color: #c084fc;
  }

  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .add-row input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid rgba(139, 92, 246, 0.3);
    background: #1a1a2e;
    color: #e0d4f5;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-row input:focus {
    border-color: #a855f7;
  }

  .add-row button, .toggle-admin-btn {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    background: #7c3aed;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.95rem;
    transition: background 0.2s;
  }

  .add-row button:hover, .toggle-admin-btn:hover {
    background: #a855f7;
  }

  .entry-list {
    list-style: none;
    max-height: 260px;
    overflow-y: auto;
    margin-bottom: 16px;
    padding-right: 4px;
  }

  .entry-list::-webkit-scrollbar { width: 6px; }
  .entry-list::-webkit-scrollbar-track { background: transparent; }
  .entry-list::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.3); border-radius: 3px; }

  .entry-list li {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 4px;
    background: rgba(139, 92, 246, 0.08);
    transition: background 0.15s;
  }

  .entry-list li:hover {
    background: rgba(139, 92, 246, 0.18);
  }

  .entry-list li .remove-btn {
    background: none;
    border: none;
    color: #ef4444;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0 4px;
    opacity: 0.6;
    transition: opacity 0.15s;
  }

  .entry-list li .remove-btn:hover {
    opacity: 1;
  }

  .option-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    color: #b8a9d4;
  }

  .option-row input[type="checkbox"] {
    accent-color: #a855f7;
    width: 16px;
    height: 16px;
  }

  .empty-msg {
    text-align: center;
    color: #6b5b8a;
    font-style: italic;
    padding: 20px 0;
  }

  /* ---- Spin Speed Toggle ---- */
  .speed-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 0.9rem;
    color: #b8a9d4;
  }

  .speed-row label { white-space: nowrap; }

  .speed-btns {
    display: flex;
    gap: 4px;
    flex: 1;
  }

  .speed-btns button {
    flex: 1;
    padding: 6px 0;
    border-radius: 6px;
    border: 1px solid rgba(139, 92, 246, 0.3);
    background: rgba(139, 92, 246, 0.08);
    color: #b8a9d4;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .speed-btns button:hover {
    background: rgba(139, 92, 246, 0.2);
  }

  .speed-btns button.active {
    background: #7c3aed;
    color: #fff;
    border-color: #7c3aed;
  }

  /* ---- Admin toggle ---- */
  .toggle-admin-btn {
    margin-bottom: 16px;
    width: 100%;
    font-size: 0.85rem;
    padding: 8px 14px;
    background: rgba(139, 92, 246, 0.15);
    border: 1px solid rgba(139, 92, 246, 0.3);
  }

  .toggle-admin-btn:hover {
    background: rgba(139, 92, 246, 0.3);
  }

  .panels {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panels.hidden-admin .panel {
    display: none;
  }

  .panels.hidden-admin .toggle-admin-btn {
    display: block;
  }

  .toggle-admin-btn {
    display: block;
  }

  /* ---- Twitch Panel ---- */
  .twitch-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .twitch-row input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid rgba(139, 92, 246, 0.3);
    background: #1a1a2e;
    color: #e0d4f5;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .twitch-row input:focus {
    border-color: #a855f7;
  }

  #twitchConnectBtn {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    background: #7c3aed;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.95rem;
    transition: background 0.2s;
    white-space: nowrap;
  }

  #twitchConnectBtn:hover { background: #a855f7; }
  #twitchConnectBtn.connected { background: #ef4444; }
  #twitchConnectBtn.connected:hover { background: #dc2626; }

  .twitch-status {
    font-size: 0.85rem;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .status-dot.off { background: #6b5b8a; }
  .status-dot.on { background: #22c55e; box-shadow: 0 0 6px rgba(34, 197, 94, 0.5); }

  .twitch-log {
    max-height: 120px;
    overflow-y: auto;
    font-size: 0.8rem;
    color: #8b7aab;
    background: rgba(0,0,0,0.15);
    border-radius: 8px;
    padding: 8px 10px;
  }

  .twitch-log::-webkit-scrollbar { width: 5px; }
  .twitch-log::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.3); border-radius: 3px; }
  .twitch-log .entry-added { color: #a855f7; }

  /* ---- Celebration Overlay ---- */
  .celebration-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    display: none;
  }

  .celebration-overlay.active {
    display: block;
    pointer-events: auto;
  }

  .celebration-overlay .backdrop {
    position: absolute;
    inset: 0;
    background: rgba(10, 5, 20, 0.85);
    animation: fadeIn 0.3s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .celebration-overlay .winner-card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    text-align: center;
    animation: winnerPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards;
  }

  @keyframes winnerPop {
    0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); }
    60% { transform: translate(-50%, -50%) scale(1.1) rotate(2deg); }
    100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
  }

  .winner-card .crown {
    font-size: 3.5rem;
    animation: crownBounce 0.5s ease 0.8s both;
    display: block;
    filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6));
  }

  @keyframes crownBounce {
    0% { transform: translateY(-30px); opacity: 0; }
    60% { transform: translateY(5px); }
    100% { transform: translateY(0); opacity: 1; }
  }

  .winner-card .winner-label {
    font-size: 1rem;
    color: #c084fc;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 6px;
    animation: labelFade 0.4s ease 0.6s both;
  }

  @keyframes labelFade {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .winner-card .winner-name {
    font-size: 2.8rem;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 0 40px rgba(168, 85, 247, 0.8), 0 0 80px rgba(168, 85, 247, 0.4);
    animation: nameFade 0.5s ease 0.7s both;
    word-break: break-word;
    max-width: 60vw;
  }

  @keyframes nameFade {
    from { opacity: 0; transform: translateY(20px) scale(0.8); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .winner-card .winner-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 350px;
    height: 350px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(168, 85, 247, 0.25) 0%, transparent 70%);
    animation: glowPulse 2s ease-in-out infinite;
    z-index: -1;
  }

  @keyframes glowPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
    50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
  }

  .winner-card .click-dismiss {
    margin-top: 24px;
    font-size: 0.9rem;
    color: #6b5b8a;
    animation: labelFade 0.4s ease 1.5s both;
  }

  /* Confetti canvas */
  #confettiCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 10000;
    pointer-events: none;
    display: none;
  }

  #confettiCanvas.active {
    display: block;
  }

  /* ---- Sound Selector ---- */
  .sound-section {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid rgba(139, 92, 246, 0.15);
    margin-bottom: 12px;
  }
  .sound-section h3 {
    font-size: 0.78rem;
    color: #c084fc;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 7px;
  }
  .sound-option {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 2px 0;
  }
  .sound-option input[type=radio] {
    accent-color: #a855f7;
    cursor: pointer;
    flex-shrink: 0;
  }
  .sound-option label {
    flex: 1;
    font-size: 0.875rem;
    color: #9a8ab8;
    cursor: pointer;
    transition: color 0.15s;
  }
  .sound-option input[type=radio]:checked + label {
    color: #e0d4f5;
  }
  .preview-btn {
    background: none;
    border: 1px solid rgba(139, 92, 246, 0.25);
    color: #6b5b8a;
    border-radius: 5px;
    padding: 2px 8px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.5;
    flex-shrink: 0;
  }
  .preview-btn:hover {
    color: #c084fc;
    border-color: #a855f7;
    background: rgba(139, 92, 246, 0.1);
  }
  .preview-btn.playing {
    color: #a855f7;
    border-color: #a855f7;
    background: rgba(139, 92, 246, 0.15);
  }
</style>
</head>
<body>

<h1>Giveaway Wheel</h1>

<div class="container">
  <div class="wheel-area">
    <div class="wheel-wrapper">
      <div class="pointer"></div>
      <canvas id="wheelCanvas" width="2520" height="2520"></canvas>
    </div>
    <button id="spinBtn">SPIN!</button>
    <div id="winnerDisplay"></div>
  </div>

  <div class="panels" id="panelsContainer">
    <button class="toggle-admin-btn" id="toggleAdminBtn">Show Controls</button>

    <div class="panel" id="entriesPanel">
      <h2>Entries</h2>
      <div class="add-row">
        <input type="text" id="nameInput" placeholder="Enter a name..." maxlength="30">
        <button id="addBtn">Add</button>
      </div>
      <ul class="entry-list" id="entryList"></ul>
      <div class="speed-row">
        <label>Spin:</label>
        <div class="speed-btns">
          <button data-speed="short" class="active">Short</button>
          <button data-speed="medium">Medium</button>
          <button data-speed="long">Long</button>
        </div>
      </div>
      <div class="sound-section">
        <h3>Spin Sound</h3>
        <div id="soundOptions"></div>
      </div>
      <div class="option-row" style="margin-bottom:8px;">
        <input type="checkbox" id="removeWinner">
        <label for="removeWinner">Remove winner after spin</label>
      </div>
      <button class="toggle-admin-btn" id="clearAllBtn" style="background:#ef4444;border-color:#ef4444;margin-top:4px;">Clear All Entries</button>
    </div>

    <div class="panel" id="twitchPanel">
      <h2>Twitch Chat (!enter)</h2>
      <div class="twitch-row">
        <input type="text" id="channelInput" placeholder="Your channel name" maxlength="40">
        <button id="twitchConnectBtn">Connect</button>
      </div>
      <div class="twitch-status">
        <span class="status-dot off" id="statusDot"></span>
        <span id="statusText">Disconnected</span>
      </div>
      <div class="option-row" style="margin-bottom: 10px;">
        <input type="checkbox" id="preventDupes" checked>
        <label for="preventDupes">Prevent duplicate entries</label>
      </div>
      <div class="twitch-log" id="twitchLog">Chat entries will appear here...</div>
    </div>
  </div>
</div>

<!-- Celebration overlay -->
<div class="celebration-overlay" id="celebrationOverlay">
  <div class="backdrop"></div>
  <div class="winner-card">
    <div class="winner-glow"></div>
    <span class="crown">&#128081;</span>
    <div class="winner-label">WINNER</div>
    <div class="winner-name" id="celebrationName"></div>
    <div class="click-dismiss">click anywhere to close</div>
  </div>
</div>
<canvas id="confettiCanvas"></canvas>

<script>
(() => {
  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const spinBtn = document.getElementById('spinBtn');
  const nameInput = document.getElementById('nameInput');
  const addBtn = document.getElementById('addBtn');
  const entryListEl = document.getElementById('entryList');
  const winnerDisplay = document.getElementById('winnerDisplay');
  const removeWinnerCheckbox = document.getElementById('removeWinner');
  const panelsContainer = document.getElementById('panelsContainer');
  const toggleAdminBtn = document.getElementById('toggleAdminBtn');
  const entriesPanel = document.getElementById('entriesPanel');
  const twitchPanel = document.getElementById('twitchPanel');
  const clearAllBtn = document.getElementById('clearAllBtn');
  const celebrationOverlay = document.getElementById('celebrationOverlay');
  const celebrationName = document.getElementById('celebrationName');
  const confettiCanvas = document.getElementById('confettiCanvas');
  const confettiCtx = confettiCanvas.getContext('2d');

  const COLORS = [
    '#7c3aed', '#9b59b6', '#6c3483', '#a569bd', '#8e44ad',
    '#5b21b6', '#7e22ce', '#6d28d9', '#9333ea', '#a855f7'
  ];

  // Named CSS colors chatters can use
  const NAMED_COLORS = {
    red:'#e74c3c', blue:'#3498db', green:'#2ecc71', yellow:'#f1c40f',
    orange:'#e67e22', pink:'#e91e63', purple:'#9b59b6', cyan:'#00bcd4',
    lime:'#8bc34a', teal:'#009688', gold:'#ffd700', coral:'#ff6b6b',
    salmon:'#fa8072', violet:'#ee82ee', magenta:'#ff00ff', indigo:'#4b0082',
    crimson:'#dc143c', turquoise:'#40e0d0', lavender:'#b57edc', mint:'#98ff98',
    maroon:'#800000', navy:'#000080', olive:'#808000', white:'#ffffff',
    hotpink:'#ff69b4', skyblue:'#87ceeb', tomato:'#ff6347', plum:'#dda0dd'
  };

  // entries: [{name: string, color: string|null}, ...]
  let entries = [];
  let currentAngle = 0;
  let spinning = false;
  let adminVisible = true;

  // Spin durations: short is current (4-6s), long is 2x, medium is halfway
  const SPIN_DURATIONS = {
    short:  { base: 4000, variance: 2000 },
    medium: { base: 6000, variance: 3000 },
    long:   { base: 8000, variance: 4000 }
  };
  let spinSpeed = 'short';

  // Speed buttons
  const speedBtns = document.querySelectorAll('.speed-btns button');
  speedBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      spinSpeed = btn.dataset.speed;
      speedBtns.forEach(b => b.classList.toggle('active', b === btn));
      localStorage.setItem('gw_spinSpeed', spinSpeed);
    });
  });

  // --- Admin Toggle ---
  function updateAdminVisibility() {
    entriesPanel.style.display = adminVisible ? '' : 'none';
    twitchPanel.style.display = adminVisible ? '' : 'none';
    toggleAdminBtn.textContent = adminVisible ? 'Hide Controls' : 'Show Controls';
    localStorage.setItem('gw_adminVisible', adminVisible);
  }

  toggleAdminBtn.addEventListener('click', () => {
    adminVisible = !adminVisible;
    updateAdminVisibility();
  });

  // --- Clear All (with confirm) ---
  clearAllBtn.addEventListener('click', () => {
    if (!entries.length) return;
    clearAllBtn.textContent = 'Are you sure?';
    clearAllBtn.style.background = '#dc2626';
    let confirmed = false;

    function onConfirm() {
      entries = [];
      save();
      renderEntries();
      drawWheel();
      winnerDisplay.innerHTML = '';
      resetBtn();
    }

    function resetBtn() {
      clearAllBtn.textContent = 'Clear All Entries';
      clearAllBtn.style.background = '#ef4444';
      clearAllBtn.removeEventListener('click', onConfirm);
      document.removeEventListener('click', onOutside, true);
    }

    function onOutside(e) {
      if (e.target !== clearAllBtn) resetBtn();
    }

    // Next click on the button confirms, click elsewhere cancels
    setTimeout(() => {
      clearAllBtn.addEventListener('click', onConfirm, { once: true });
      document.addEventListener('click', onOutside, { capture: true, once: true });
    }, 0);
  });

  // --- LocalStorage ---
  function save() {
    localStorage.setItem('gw_entries', JSON.stringify(entries));
    localStorage.setItem('gw_removeWinner', removeWinnerCheckbox.checked);
  }

  function load() {
    try {
      const stored = localStorage.getItem('gw_entries');
      if (stored) {
        const parsed = JSON.parse(stored);
        entries = parsed.map(e => typeof e === 'string' ? { name: e, color: null } : e);
      }
    } catch { /* ignore */ }
    removeWinnerCheckbox.checked = localStorage.getItem('gw_removeWinner') === 'true';
    adminVisible = localStorage.getItem('gw_adminVisible') !== 'false';
    const savedSpeed = localStorage.getItem('gw_spinSpeed');
    if (savedSpeed && SPIN_DURATIONS[savedSpeed]) {
      spinSpeed = savedSpeed;
      speedBtns.forEach(b => b.classList.toggle('active', b.dataset.speed === spinSpeed));
    }
  }

  function getSegmentColor(entry, index) {
    return entry.color || COLORS[index % COLORS.length];
  }

  // --- Parse user color from chat command ---
  function parseUserColor(message) {
    // !enter blue  or  !enter #ff00aa
    const parts = message.trim().split(/\s+/);
    if (parts.length < 2) return null;
    const colorArg = parts.slice(1).join('').toLowerCase();
    // Hex color
    if (/^#[0-9a-f]{6}$/.test(colorArg)) return colorArg;
    // Named color
    if (NAMED_COLORS[colorArg]) return NAMED_COLORS[colorArg];
    return null;
  }

  // --- Draw Wheel ---
  function drawWheel() {
    // Draw at 3× logical resolution (2520px buffer, 420px CSS display).
    // At maxZoom 2.8× the canvas still has 2520/(420*2.8) ≈ 2.1× density — stays sharp.
    const LOGICAL = 840;
    const scale = canvas.width / LOGICAL; // 3
    const cx = LOGICAL / 2;  // 420 in logical units
    const cy = LOGICAL / 2;
    const r  = cx - 20;      // 400

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.scale(scale, scale);

    if (entries.length === 0) {
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = '#2d1b4e';
      ctx.fill();
      ctx.fillStyle = '#6b5b8a';
      ctx.font = '600 32px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Add entries to spin!', cx, cy);
      ctx.restore();
      return;
    }

    const sliceAngle = (Math.PI * 2) / entries.length;

    entries.forEach((entry, i) => {
      const start = currentAngle + i * sliceAngle;
      const end = start + sliceAngle;

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, end);
      ctx.closePath();
      ctx.fillStyle = getSegmentColor(entry, i);
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(start + sliceAngle / 2);
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      const fontSize = Math.min(28, Math.max(14, 400 / entries.length));
      ctx.font = `600 ${fontSize}px "Segoe UI", sans-serif`;
      const maxTextWidth = r * 0.65;
      let displayName = entry.name;
      while (ctx.measureText(displayName).width > maxTextWidth && displayName.length > 1) {
        displayName = displayName.slice(0, -1);
      }
      if (displayName !== entry.name) displayName += '...';
      ctx.fillText(displayName, r - 24, 0);
      ctx.restore();
    });

    ctx.beginPath();
    ctx.arc(cx, cy, 36, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1a2e';
    ctx.fill();
    ctx.strokeStyle = '#a855f7';
    ctx.lineWidth = 4;
    ctx.stroke();

    ctx.restore();
  }

  // ========== CONFETTI ==========
  let confettiPieces = [];
  let confettiAnimId = null;

  function launchConfetti() {
    confettiCanvas.width = window.innerWidth;
    confettiCanvas.height = window.innerHeight;
    confettiCanvas.classList.add('active');
    confettiPieces = [];

    const colors = ['#a855f7','#c084fc','#7c3aed','#f59e0b','#ec4899','#22c55e','#3b82f6','#ef4444','#fbbf24','#e879f9'];

    for (let i = 0; i < 250; i++) {
      confettiPieces.push({
        x: Math.random() * confettiCanvas.width,
        y: Math.random() * -confettiCanvas.height - 50,
        w: Math.random() * 10 + 5,
        h: Math.random() * 6 + 3,
        color: colors[Math.floor(Math.random() * colors.length)],
        vx: (Math.random() - 0.5) * 4,
        vy: Math.random() * 3 + 2,
        rotation: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 10,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: Math.random() * 0.1 + 0.03
      });
    }

    function drawConfetti() {
      confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      let alive = false;

      for (const p of confettiPieces) {
        if (p.y > confettiCanvas.height + 50) continue;
        alive = true;

        p.x += p.vx + Math.sin(p.wobble) * 1.5;
        p.y += p.vy;
        p.rotation += p.rotSpeed;
        p.wobble += p.wobbleSpeed;
        p.vy += 0.03;

        confettiCtx.save();
        confettiCtx.translate(p.x, p.y);
        confettiCtx.rotate((p.rotation * Math.PI) / 180);
        confettiCtx.fillStyle = p.color;
        confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        confettiCtx.restore();
      }

      if (alive) {
        confettiAnimId = requestAnimationFrame(drawConfetti);
      } else {
        stopConfetti();
      }
    }

    confettiAnimId = requestAnimationFrame(drawConfetti);
  }

  function stopConfetti() {
    if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
    confettiAnimId = null;
    confettiCanvas.classList.remove('active');
    confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }

  let currentSound = 'classic';

  // ---- helpers ----
  function makeNoise(ac) {
    const bufSize = Math.ceil(ac.sampleRate * 0.1);
    const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource();
    src.buffer = buf;
    return src;
  }

  function makeDistortion(ac, amount = 80) {
    const ws = ac.createWaveShaper();
    const n = 256;
    const curve = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      const x = (i * 2) / n - 1;
      curve[i] = ((Math.PI + amount) * x) / (Math.PI + amount * Math.abs(x));
    }
    ws.curve = curve;
    ws.oversample = '4x';
    return ws;
  }

  function schedNote(ac, freq, type, startT, endT, vol) {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, startT);
    gain.gain.exponentialRampToValueAtTime(0.0001, endT);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start(startT);
    osc.stop(endT + 0.01);
  }

  function schedNoise(ac, hpFreq, startT, endT, vol) {
    const noise = makeNoise(ac);
    const filter = ac.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = hpFreq;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(vol, startT);
    gain.gain.exponentialRampToValueAtTime(0.0001, endT);
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(ac.destination);
    noise.start(startT);
    noise.stop(endT + 0.01);
  }

  // --- Spin ---
  const wheelWrapper = document.querySelector('.wheel-wrapper');

  function resetZoom() {
    wheelWrapper.style.transition = 'none';
    wheelWrapper.style.transform = 'scale(1)';
    wheelWrapper.style.transformOrigin = 'center top';
  }

  function spin() {
    if (spinning || entries.length < 2) return;
    spinning = true;
    spinBtn.disabled = true;
    winnerDisplay.innerHTML = '';
    hideCelebration();
    resetZoom();
    spinTickCount = 0;

    const spd = SPIN_DURATIONS[spinSpeed];
    const totalRotation = Math.PI * 2 * (5 + Math.random() * 5);
    const duration = spd.base + Math.random() * spd.variance;
    const startAngle = currentAngle;
    const startTime = performance.now();
    const zoomStart = 0.5; // start zooming at halfway through
    const maxZoom = 2.8;
    let zoomStarted = false;

    let audioCtx;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch { /* no audio */ }

    let lastSegment = -1;

    function tick() {
      if (!audioCtx) return;
      SOUND_THEMES[currentSound].tick(audioCtx, spinTickCount++);
    }

    function easeOut(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    // Smooth ease-in for the zoom (slow start, accelerates)
    function easeInCubic(t) {
      return t * t * t * t * t; // quintic — stays slow longer then rockets at the end
    }

    function animate(now) {
      const elapsed = now - startTime;
      const t = Math.min(elapsed / duration, 1);
      const eased = easeOut(t);

      currentAngle = startAngle + totalRotation * eased;

      if (entries.length > 0) {
        const sliceAngle = (Math.PI * 2) / entries.length;
        const normalizedAngle = ((Math.PI * 2 - (currentAngle % (Math.PI * 2))) + Math.PI * 2) % (Math.PI * 2);
        const seg = Math.floor(normalizedAngle / sliceAngle) % entries.length;
        if (seg !== lastSegment) {
          tick();
          lastSegment = seg;
        }
      }

      // Zoom in during last 1/3 of spin
      if (t >= zoomStart) {
        const zoomT = (t - zoomStart) / (1 - zoomStart); // 0 to 1 over last third
        const zoomEased = easeInCubic(zoomT);
        const scale = 1 + (maxZoom - 1) * zoomEased;
        wheelWrapper.style.transition = 'none';
        wheelWrapper.style.transform = `scale(${scale})`;
      }

      drawWheel();

      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        spinning = false;
        spinBtn.disabled = false;

        const sliceAngle = (Math.PI * 2) / entries.length;
        const pointerAngle = ((-Math.PI / 2 - currentAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
        const winnerIndex = Math.floor(pointerAngle / sliceAngle) % entries.length;
        const winner = entries[winnerIndex];

        // Show big celebration
        showCelebration(winner.name);

        // Zoom back out smoothly
        wheelWrapper.style.transition = 'transform 0.12s ease-in';
        wheelWrapper.style.transform = 'scale(1)';

        if (removeWinnerCheckbox.checked) {
          entries.splice(winnerIndex, 1);
          save();
          renderEntries();
          setTimeout(() => drawWheel(), 1500);
        }
      }
    }

    requestAnimationFrame(animate);
  }

  spinBtn.addEventListener('click', spin);

  // --- Twitch Chat Integration ---
  const channelInput = document.getElementById('channelInput');
  const twitchConnectBtn = document.getElementById('twitchConnectBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const preventDupes = document.getElementById('preventDupes');
  const twitchLog = document.getElementById('twitchLog');

  let ws = null;
  let twitchConnected = false;

  function setTwitchStatus(connected, text) {
    twitchConnected = connected;
    statusDot.className = 'status-dot ' + (connected ? 'on' : 'off');
    statusText.textContent = text;
    twitchConnectBtn.textContent = connected ? 'Disconnect' : 'Connect';
    twitchConnectBtn.className = connected ? 'connected' : '';
    channelInput.disabled = connected;
  }

  function logTwitch(msg, className) {
    const div = document.createElement('div');
    div.textContent = msg;
    if (className) div.className = className;
    twitchLog.appendChild(div);
    twitchLog.scrollTop = twitchLog.scrollHeight;
    while (twitchLog.children.length > 50) twitchLog.removeChild(twitchLog.firstChild);
  }

  function connectTwitch() {
    const channel = channelInput.value.trim().toLowerCase().replace(/^#/, '');
    if (!channel) return;

    localStorage.setItem('gw_channel', channel);
    twitchLog.innerHTML = '';
    logTwitch('Connecting to #' + channel + '...');

    ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

    ws.onopen = () => {
      ws.send('CAP REQ :twitch.tv/tags');
      ws.send('NICK justinfan' + Math.floor(Math.random() * 99999));
      ws.send('JOIN #' + channel);
    };

    ws.onmessage = (event) => {
      const lines = event.data.split('\r\n');
      for (const line of lines) {
        if (!line) continue;

        if (line.startsWith('PING')) {
          ws.send('PONG :tmi.twitch.tv');
          continue;
        }

        if (line.includes('366') || line.includes('JOIN')) {
          if (!twitchConnected && line.includes('JOIN')) {
            setTwitchStatus(true, 'Connected to #' + channel);
            logTwitch('Connected! Listening for !enter...');
          }
          continue;
        }

        // Parse PRIVMSG
        const privmsgMatch = line.match(/:(\w+)!\w+@\w+\.tmi\.twitch\.tv PRIVMSG #\w+ :(.+)/);
        if (privmsgMatch) {
          const username = privmsgMatch[1];
          const message = privmsgMatch[2].trim();

          // Match !enter or !enter <color>
          if (/^!enter(\s|$)/i.test(message)) {
            const customColor = parseUserColor(message);

            // Extract Twitch name color from IRC tags
            let twitchColor = null;
            const colorMatch = line.match(/color=(#[0-9A-Fa-f]{6})/);
            if (colorMatch) twitchColor = colorMatch[1];

            // Priority: custom arg > twitch name color > fallback
            const chosenColor = customColor || twitchColor || null;

            // Check if already entered
            const existingIndex = entries.findIndex(e => e.name.toLowerCase() === username.toLowerCase());

            if (existingIndex !== -1) {
              // Already entered — update their color if they provided one
              if (customColor) {
                entries[existingIndex].color = customColor;
                save();
                renderEntries();
                drawWheel();
                logTwitch(username + ' updated color to ' + customColor, 'entry-added');
              } else if (preventDupes.checked) {
                logTwitch(username + ' already entered');
              }
              continue;
            }

            entries.push({ name: username, color: chosenColor });
            save();
            renderEntries();
            drawWheel();
            logTwitch('+ ' + username + ' entered!' + (customColor ? ' (color: ' + customColor + ')' : ''), 'entry-added');
          }
        }
      }
    };

    ws.onclose = () => {
      setTwitchStatus(false, 'Disconnected');
      logTwitch('Disconnected.');
      ws = null;
    };

    ws.onerror = () => {
      setTwitchStatus(false, 'Connection error');
      logTwitch('Connection error. Try again.');
      ws = null;
    };
  }

  function disconnectTwitch() {
    if (ws) { ws.close(); ws = null; }
  }

  twitchConnectBtn.addEventListener('click', () => {
    if (twitchConnected) disconnectTwitch();
    else connectTwitch();
  });

  channelInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !twitchConnected) connectTwitch();
  });

  const savedChannel = localStorage.getItem('gw_channel');
  if (savedChannel) channelInput.value = savedChannel;

  // --- Init ---
  load();
  updateAdminVisibility();
  renderEntries();
  drawWheel();

  // --- Service Worker ---
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
